
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-api-migrate
  labels:
    {{- include "plane.commonLabels" $ | nindent 4 }}
    {{- with .Values.api.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
    {{- with .Values.api.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-api-migrate
        {{- include "plane.commonLabels" $ | nindent 8 }}
    spec:
      # Block the migrate hook until Postgres (and RabbitMQ) accept connections.
      # On a cold start the datastores take a while to come up; without this the
      # migrate command fails and the hook churns (Fleet reports ErrApplied and
      # respawns the Job) until they are ready.
      initContainers:
      - name: {{ .Release.Name }}-wait-for-deps
        image: {{ .Values.api.image | default "ghcr.io/inomotech-foss/paperplane-backend" }}{{ with .Values.planeVersion }}:{{ . }}{{ end }}
        imagePullPolicy: {{ .Values.api.pullPolicy | default "Always" }}
        command:
          - python
          - -c
          - |
            import os, socket, time
            from urllib.parse import urlparse

            def wait(name, url, default_port):
                url = (url or "").strip()
                if not url:
                    return
                parsed = urlparse(url)
                host, port = parsed.hostname, parsed.port or default_port
                if not host:
                    return
                while True:
                    try:
                        with socket.create_connection((host, port), timeout=5):
                            print("%s reachable at %s:%s" % (name, host, port), flush=True)
                            return
                    except OSError:
                        print("Waiting for %s at %s:%s..." % (name, host, port), flush=True)
                        time.sleep(2)

            wait("Postgres", os.environ.get("DATABASE_URL"), 5432)
            wait("RabbitMQ", os.environ.get("AMQP_URL"), 5672)
        envFrom:
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.app_env_existingSecret) }}{{ .Values.external_secrets.app_env_existingSecret }}{{ else }}{{ .Release.Name }}-app-secrets{{ end }}
              optional: false
      containers:
      - name: {{ .Release.Name }}-api-migrate
        image: {{ include "plane.image" (dict "image" (.Values.api.image | default "ghcr.io/inomotech-foss/paperplane-backend") "version" .Values.planeVersion) }}
        command: 
          - ./bin/docker-entrypoint-migrator.sh
        imagePullPolicy: {{ .Values.api.pullPolicy | default "Always" }}
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-app-vars
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.app_env_existingSecret) }}{{ .Values.external_secrets.app_env_existingSecret }}{{ else }}{{ .Release.Name }}-app-secrets{{ end }}
              optional: false
          - secretRef:
              name:  {{ if not (empty .Values.external_secrets.doc_store_existingSecret) }}{{ .Values.external_secrets.doc_store_existingSecret }}{{ else }}{{ .Release.Name }}-doc-store-secrets{{ end }}
              optional: false
          {{- if .Values.secretGenerator.enabled }}
          - secretRef:
              name: {{ .Release.Name }}-generated-secrets
              optional: false
          {{- end }}
          {{- with .Values.api.extraEnvFrom }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.api.extraVolumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      restartPolicy: OnFailure
      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account
      {{- include "plane.podScheduling" .Values.api }}
      {{- with .Values.api.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
