{{- if .Values.provision.enabled }}
{{- $oidc := .Values.provision.auth.oidc }}
{{- $files := $oidc.files | default dict }}
{{- if and $oidc.enabled (not (or $oidc.issuer (get $files "OIDC_ISSUER"))) }}
{{- fail "provision.auth.oidc: set issuer or files.OIDC_ISSUER when oidc.enabled is true" }}
{{- end }}
{{- if and $oidc.enabled (not (or $oidc.clientId (get $files "OIDC_CLIENT_ID"))) }}
{{- fail "provision.auth.oidc: set clientId or files.OIDC_CLIENT_ID when oidc.enabled is true" }}
{{- end }}
{{- if and $oidc.enabled (not (or $oidc.clientSecret (get $files "OIDC_CLIENT_SECRET"))) }}
{{- fail "provision.auth.oidc: set clientSecret or files.OIDC_CLIENT_SECRET when oidc.enabled is true" }}
{{- end }}
{{- $managed := list }}
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-provision-vars
  labels:
    {{- include "plane.commonLabels" $ | nindent 4 }}
data:
  {{- with .Values.provision.instanceName }}
  INSTANCE_NAME: {{ . | quote }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.provision.telemetry) }}
  INSTANCE_TELEMETRY_ENABLED: {{ .Values.provision.telemetry | ternary "1" "0" | quote }}
  {{- end }}
  {{- if .Values.provision.setupDone }}
  INSTANCE_SETUP_DONE: "1"
  {{- end }}
  {{- with .Values.provision.adminEmails }}
  INSTANCE_ADMIN_EMAILS: {{ join "," . | quote }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.provision.auth.emailPassword) }}
  ENABLE_EMAIL_PASSWORD: {{ .Values.provision.auth.emailPassword | ternary "1" "0" | quote }}
  {{- $managed = append $managed "ENABLE_EMAIL_PASSWORD" }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.provision.auth.magicLink) }}
  ENABLE_MAGIC_LINK_LOGIN: {{ .Values.provision.auth.magicLink | ternary "1" "0" | quote }}
  {{- $managed = append $managed "ENABLE_MAGIC_LINK_LOGIN" }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.provision.auth.signup) }}
  ENABLE_SIGNUP: {{ .Values.provision.auth.signup | ternary "1" "0" | quote }}
  {{- $managed = append $managed "ENABLE_SIGNUP" }}
  {{- end }}
  {{- if $oidc.enabled }}
  {{- /* Derived on-flag and a boolean toggle: not operator-supplied strings, so
         rendered inline rather than through the value/file helper below. */}}
  IS_OIDC_ENABLED: "1"
  OIDC_TRUST_EMAIL: {{ $oidc.trustEmail | ternary "1" "0" | quote }}
  {{- /* Every string option: inline value or, if listed in oidc.files, a
         mounted file. OIDC_CLIENT_SECRET is marked secret so its inline value
         is emitted into the Secret below instead of this ConfigMap. */}}
  {{- $oidcVars := list
      (dict "key" "OIDC_ISSUER" "value" $oidc.issuer "default" "")
      (dict "key" "OIDC_PROVIDER_NAME" "value" $oidc.providerName "default" "SSO")
      (dict "key" "OIDC_SCOPES" "value" $oidc.scopes "default" "openid email profile")
      (dict "key" "OIDC_AUTHORIZE_URL" "value" $oidc.authorizeUrl "default" "")
      (dict "key" "OIDC_TOKEN_URL" "value" $oidc.tokenUrl "default" "")
      (dict "key" "OIDC_USERINFO_URL" "value" $oidc.userinfoUrl "default" "")
      (dict "key" "OIDC_JWKS_URL" "value" $oidc.jwksUrl "default" "")
      (dict "key" "OIDC_ADMIN_CLAIM" "value" $oidc.adminClaim "default" "roles")
      (dict "key" "OIDC_ADMIN_ROLE" "value" $oidc.adminRole "default" "")
      (dict "key" "OIDC_CLIENT_ID" "value" $oidc.clientId "default" "")
      (dict "key" "OIDC_CLIENT_SECRET" "value" $oidc.clientSecret "default" "" "secret" true)
  }}
  {{- range $oidcVars }}
  {{- include "plane.provision.var" (dict "key" .key "value" .value "default" .default "files" $files "secret" .secret) | nindent 2 }}
  {{- end }}
  {{- $managed = concat $managed (list "IS_OIDC_ENABLED" "OIDC_ISSUER" "OIDC_CLIENT_ID" "OIDC_CLIENT_SECRET" "OIDC_PROVIDER_NAME" "OIDC_SCOPES" "OIDC_TRUST_EMAIL" "OIDC_AUTHORIZE_URL" "OIDC_TOKEN_URL" "OIDC_USERINFO_URL" "OIDC_JWKS_URL" "OIDC_ADMIN_CLAIM" "OIDC_ADMIN_ROLE") }}
  {{- end }}
  PROVISION_MANAGED_KEYS: {{ join "," $managed | quote }}
{{- if and $oidc.enabled $oidc.clientSecret (not (get $files "OIDC_CLIENT_SECRET")) }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-provision-secrets
  labels:
    {{- include "plane.commonLabels" $ | nindent 4 }}
stringData:
  OIDC_CLIENT_SECRET: {{ $oidc.clientSecret | quote }}
{{- end }}
{{- end }}
