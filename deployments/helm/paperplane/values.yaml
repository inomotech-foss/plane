# Image tag used when images below are not digest-pinned (e.g. a raw
# `helm install` from source). CI blanks this and pins digests when publishing.
planeVersion: stable

dockerRegistry:
  enabled: false
  host: "ghcr.io"
  loginid: ""
  password: ""

ingress:
  enabled: true
  appHost: "plane.example.com"
  # Scheme the browser uses to reach appHost. Set to https when TLS terminates
  # at the gateway/ingress so WEB_URL matches (magic links, CSRF origin checks).
  appProtocol: "http"
  minioHost: ""
  rabbitmqHost: ""
  # Set to "traefik" (or any value starting with "traefik") to deploy native Traefik IngressRoute CRDs
  # (templates/ingress-traefik.yaml). Set to any other value (e.g., "nginx") to deploy a standard
  # networking.k8s.io/v1 Ingress resource (templates/ingress.yaml).
  ingressClass: "traefik"
  # Traefik-specific options (only used when ingressClass starts with "traefik")
  traefik:
    maxRequestBodyBytes: 20971520   # in bytes (default: 20 MiB)
  # ingress_annotations: { "nginx.ingress.kubernetes.io/proxy-body-size": "5m" }
  # Gateway API (gateway.networking.k8s.io/v1). When enabled, the chart creates
  # HTTPRoutes attached to an existing Gateway instead of an Ingress/IngressRoute.
  # ingressClass is ignored. TLS termination and request-body limits are set on
  # the Gateway/listener, not here.
  gatewayAPI:
    enabled: false
    # Gateways this route attaches to. List several to span an HA Gateway pair.
    # Required (at least one entry) when gatewayAPI is enabled.
    parentRefs: []
      # - name: ""          # required: name of an existing Gateway
      #   namespace: ""     # optional: Gateway namespace (defaults to the release namespace)
      #   sectionName: ""   # optional: target a specific listener on the Gateway

# SSL Configuration - Valid only if ingress.enabled is true
ssl:
  tls_secret_name: "" # If you have a custom TLS secret name
  # If you want to use Let's Encrypt, set createIssuer and generateCerts to true
  createIssuer: false
  issuer: "http" # Allowed : cloudflare, digitalocean, http
  token: "" # not required for http
  server: https://acme-v02.api.letsencrypt.org/directory
  email: plane@example.com
  generateCerts: false

redis:
  local_setup: true
  image: valkey/valkey:7.2.11-alpine
  servicePort: 6379
  storageClass: ""
  volumeSize: 100Mi
  pullPolicy: IfNotPresent
  assign_cluster_ip: false
  labels: {}
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

