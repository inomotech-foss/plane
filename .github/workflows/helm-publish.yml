name: Publish Helm Chart

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version (semver; a leading v is stripped). Defaults to Chart.yaml."
        required: false
        type: string
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "deployments/helm/**"
      - ".github/workflows/helm-publish.yml"

permissions:
  contents: read
  packages: write

env:
  CHART_DIR: deployments/helm/plane-ce
  OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  helm:
    name: Lint, package and publish
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3

      - name: Lint
        run: helm lint "$CHART_DIR"

      - name: Render check
        run: helm template plane "$CHART_DIR" > /dev/null

      - name: Resolve versions
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          RAW="$INPUT_VERSION"
          if [ -z "$RAW" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            RAW="${GITHUB_REF_NAME}"
          fi
          if [ -n "$RAW" ]; then
            CHART_VERSION="${RAW#v}"
            echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
            echo "plane_version=v${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pin image tag to release
        if: steps.ver.outputs.plane_version != ''
        run: |
          sed -i "s/^planeVersion:.*/planeVersion: ${{ steps.ver.outputs.plane_version }}/" "$CHART_DIR/values.yaml"

      - name: Package
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ -n "${{ steps.ver.outputs.chart_version }}" ]; then
            helm package "$CHART_DIR" \
              --version "${{ steps.ver.outputs.chart_version }}" \
              --app-version "${{ steps.ver.outputs.chart_version }}" \
              --destination dist
          else
            helm package "$CHART_DIR" --destination dist
          fi
          echo "pkg=$(ls dist/*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push
        if: github.event_name != 'pull_request'
        run: helm push "${{ steps.package.outputs.pkg }}" "$OCI_REPO"
